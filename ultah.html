<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ulang Tahun Mila</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Pacifico&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
  /* RAIN IMAGE EFFECT */
.rain-container{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  overflow:hidden;
  pointer-events:none; /* 🔥 biar ga ganggu klik & music */
  z-index:1; /* di bawah UI */
}

.rain-img{
  position:absolute;
  top:-100px;
  width:40px;
  height:40px;
  object-fit:cover;
  border-radius:50%;
  opacity:0.7;
  animation:fall linear infinite;
}

@keyframes fall{
  to{
    transform:translateY(110vh);
  }
}
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  flex-direction:column;
  background:linear-gradient(135deg,#a7d8ff,#d6f0ff);
  font-family:'Poppins',sans-serif;
  color:#333;
  overflow-y:auto;
}

/* CONTAINER */
.container{
  width:100%;
  max-width:500px;
  margin:auto;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:100px 20px 80px;
  box-sizing:border-box;
}

/* CLOCK */
.clock-container{
  position:fixed;
  top:20px;
  left:20px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  padding:8px 14px;
  border-radius:12px;
  font-weight:600;
  font-size:clamp(12px,2vw,18px);
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  z-index:10;
}

/* PROFILE */
.profile{
  position:relative;
  width:clamp(90px,25vw,130px);
  height:clamp(90px,25vw,130px);
  margin-bottom:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  animation:pop 1s ease;
}

.profile img{
  width:80%;
  height:80%;
  border-radius:50%;
  object-fit:cover;
  z-index:2;
  border:4px solid white;
}

.ring{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:50%;
  background:conic-gradient(#00c6ff,#0072ff,#00c6ff);
  animation:spin 4s linear infinite;
  filter:blur(2px);
}

@keyframes spin{
  0%{transform:rotate(0deg)}
  100%{transform:rotate(360deg)}
}

@keyframes pop{
  0%{transform:scale(0)}
  100%{transform:scale(1)}
}

/* TEXT */
.name{
  font-size:clamp(20px,5vw,32px);
  margin-bottom:20px;
  font-weight:600;
  opacity:0;
  animation:fadeIn 2s forwards;
}

/* CAKE */
.cake{
  position:relative;
  width:220px;
  height:240px;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  flex-direction:column;
  margin-top:10px;
}

.layer{
  position:absolute;
  width:220px;
  height:60px;
  border-radius:15px;
  left:0;
  opacity:0;
  transform:translateY(-100px);
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.layer:nth-child(1){
  bottom:25px;
  background:linear-gradient(45deg,#ffe0e9,#ffc2d1);
  animation:drop 0.8s forwards;
}

.layer:nth-child(2){
  bottom:80px;
  background:repeating-linear-gradient(45deg,#ff8fab,#ff8fab 10px,#ffc2d1 10px,#ffc2d1 20px);
  animation:drop 0.8s 0.8s forwards;
}

.layer:nth-child(3){
  bottom:140px;
  background:radial-gradient(circle,#fb6f92 40%,#ff8fab);
  animation:drop 0.8s 1.6s forwards;
}

.choco{
  position:absolute;
  bottom:170px;
  width:220px;
  height:40px;
  background:linear-gradient(#5a2d0c,#3b1f08);
  border-radius:15px 15px 10px 10px;
  opacity:0;
  transform:translateY(-60px);
  animation:drop 0.6s 2.2s forwards;
}

.drip{
  position:absolute;
  top:120px;
  width:220px;
  height:30px;
  background:#fff;
  border-radius:0 0 20px 20px;
  opacity:0;
  animation:fadeIn 1s 2.5s forwards;
}

@keyframes drop{
  to{opacity:1;transform:translateY(0)}
}

.candle{
  position:absolute;
  width:12px;
  height:45px;
  background:linear-gradient(#fff,#ddd);
  left:104px;
  bottom:210px;
  opacity:0;
  transform:translateY(-60px);
  animation:drop 0.6s 3s forwards;
}

.flame{
  position:absolute;
  width:12px;
  height:12px;
  background:radial-gradient(circle, yellow, orange);
  border-radius:50%;
  top:-12px;
  animation:flicker .2s infinite;
}

@keyframes flicker{
  0%{transform:scale(1)}
  50%{transform:scale(1.3)}
  100%{transform:scale(1)}
}

@keyframes fadeIn{to{opacity:1}}

/* FINAL TEXT */
.final-text{
  margin-top:40px;
  font-family:'Pacifico',cursive;
  font-size:clamp(24px,6vw,42px);
  opacity:0;
}

.show{animation:fadeIn 2s forwards}

/* MUSIC PLAYER */
.music-player{
  position:fixed;   /* 🔥 bikin nempel di layar */
  top:20px;
  right:20px;       /* pindah ke kanan */
  
  display:flex;
  align-items:center;
  justify-content:space-between;
  
  width:180px;
  padding:8px 12px;
  border-radius:12px;
  
  background:rgba(255,255,255,0.3);
  backdrop-filter: blur(10px);
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  
  font-size:13px;
  z-index:10;
}

.music-player button{
  border:none;
  background:#0072ff;
  color:white;
  border-radius:50%;
  width:30px;
  height:30px;
  cursor:pointer;
  font-size:14px;
}

/* FOOTER */
footer{
  width:100%;
  text-align:center;
  padding:15px;
  font-size:clamp(12px,2.5vw,14px);
  background:rgba(255,255,255,0.3);
  backdrop-filter: blur(8px);
}

@media (max-width:480px){
  .music-player{
    top:10px;
    right:10px;
    width:150px;
    font-size:12px;
  }
}

/* RESPONSIVE */
@media (max-width:480px){
  .clock-container{
    top:10px;
    left:10px;
    padding:6px 10px;
  }
  .container{
    padding-top:80px;
  }
}

@media (min-width:768px){
  .container{ max-width:600px; }
}

@media (min-width:1024px){
  .container{ max-width:700px; }
}
</style>
</head>

<body>
<div class="rain-container" id="rain"></div>
<div class="clock-container">
  <span id="hours">00</span> :
  <span id="minutes">00</span> :
  <span id="seconds">00</span>
</div>

<div class="container">

<div class="profile">
  <div class="ring"></div>
  <img src="FOTO MILA.jpeg" alt="foto">
</div>

<div class="name">Happy Birthday, MILA 🎉</div>

<div class="cake">
  <div class="layer"></div>
  <div class="layer"></div>
  <div class="layer"></div>
  <div class="choco"></div>
  <div class="drip"></div>
  <div class="candle">
    <div class="flame"></div>
  </div>
</div>

<div class="final-text" id="final">Happy birthday! May you be blessed with a long life, excellent health, and an undying spirit.</div>

<!-- MUSIC PLAYER -->
<div class="music-player">
  <span>🎵 Happy Birthday</span>
  <button id="musicBtn">⏸</button>
</div>

</div>

<footer>
Made with RIF for MILA | 2026
</footer>

<audio id="music" src="Happy Birthday.mp3" preload="auto"></audio>

<script>
const music = document.getElementById('music');
const btn = document.getElementById('musicBtn');

let isPlaying = false;
let started = false;

/* ===== START AUDIO SEKALI AJA ===== */
function startMusic(){
  if(started) return; // 🔥 biar gak ke trigger 2x
  started = true;

  music.currentTime = 0;
  music.play()
    .then(()=>{
      isPlaying = true;
      btn.textContent = "⏸";
    })
    .catch(()=>{});
}

/* ===== WAJIB INTERAKSI USER (HP FIX) ===== */
document.addEventListener("click", startMusic, { once:true });
document.addEventListener("touchstart", startMusic, { once:true });

/* ===== BUTTON CONTROL ===== */
btn.addEventListener("click", ()=>{
  if(!started){
    startMusic();
    return;
  }

  if(isPlaying){
    music.pause();
    btn.textContent = "▶";
  }else{
    music.play();
    btn.textContent = "⏸";
  }
  isPlaying = !isPlaying;
});

/* ===== PRELOAD FULL ===== */
music.preload = "auto";

/* OPTIONAL: loop biar gak berhenti */
music.loop = true;

/* ===== FOTO HUJAN EFFECT ===== */
const rainContainer = document.getElementById("rain");
const imgSrc = "FOTO MILA.jpeg"; // foto yang sama

function createRain(){
  const img = document.createElement("img");
  img.src = imgSrc;
  img.className = "rain-img";

  // random posisi & ukuran
  img.style.left = Math.random() * window.innerWidth + "px";
  img.style.width = (30 + Math.random() * 30) + "px";
  img.style.height = img.style.width;

  // speed random
  img.style.animationDuration = (3 + Math.random() * 3) + "s";

  rainContainer.appendChild(img);

  // hapus biar ga numpuk berat
  setTimeout(()=>{
    img.remove();
  },6000);
}

// spawn terus
setInterval(createRain, 300);
/* ===== CONFETTI ===== */
function startConfetti(){
  setInterval(()=>{
    confetti({particleCount:60,angle:60,spread:120,origin:{x:0,y:1}});
    confetti({particleCount:60,angle:120,spread:120,origin:{x:1,y:1}});
    confetti({particleCount:80,spread:160,origin:{x:0.5,y:0}});
  },500);
}

setTimeout(()=>{
  final.classList.add('show');
  startConfetti();
},4200);

/* ===== CLOCK FIX (lu tadi error dikit) ===== */
const hours = document.getElementById("hours");
const minutes = document.getElementById("minutes");
const seconds = document.getElementById("seconds");

function updateClock(){
  const now = new Date();
  hours.textContent = now.getHours().toString().padStart(2,"0");
  minutes.textContent = now.getMinutes().toString().padStart(2,"0");
  seconds.textContent = now.getSeconds().toString().padStart(2,"0");
}

updateClock();
setInterval(updateClock,1000);
</script>

</body>
</html>
